services:
  mongodb:
    image: mongo:7
    container_name: local-ai-chat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-chat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment to use an NVIDIA GPU (requires the NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-chat-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/local_ai_chat
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.1:8b}
      JWT_SECRET: ${JWT_SECRET:?set a long random JWT_SECRET in your .env file}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://10.0.2.2:*}

volumes:
  mongo_data:
  ollama_data:
